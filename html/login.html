<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - NT Logistics ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-container">
        <div class="auth-card">
            <div class="auth-image"></div>
            <div class="auth-form">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-navy">Đăng Nhập</h2>
                    <p class="text-muted">Hệ thống ERP Nguyên Tâm Logistics</p>
                </div>
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fa fa-user"></i></span>
                            <input type="text" class="form-control bg-light border-0 py-2" placeholder="Nhập username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fa fa-lock"></i></span>
                            <input type="password" class="form-control bg-light border-0 py-2" placeholder="********" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label text-muted" for="remember">Ghi nhớ</label>
                        </div>
                        <a href="#" class="text-navy text-decoration-none small fw-semibold">Quên mật khẩu?</a>
                    </div>
                    <button type="submit" class="btn btn-navy w-100 py-2 fw-bold">ĐĂNG NHẬP</button>
                    <p class="text-center mt-4 text-muted small">
                        Chưa có tài khoản? <a href="register.html" class="text-navy fw-bold text-decoration-none">Đăng ký ngay</a>
                    </p>
                </form>
            </div>
        </div>
    </section>
    <script src="js/app.js"></script>
</body>
</html>
