<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - NT Logistics ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="auth-container">
        <div class="auth-card">
            <div class="auth-image"></div>
            <div class="auth-form">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-navy">Tạo Tài Khoản</h2>
                    <p class="text-muted">Cấp quyền nhân sự nội bộ</p>
                </div>
                <form id="registerForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-semibold">Họ và Tên</label>
                            <input type="text" class="form-control bg-light border-0" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-semibold">Tên đăng nhập</label>
                            <input type="text" class="form-control bg-light border-0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Email công ty</label>
                        <input type="email" class="form-control bg-light border-0" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Vai trò (Role)</label>
                        <select class="form-select bg-light border-0">
                            <option>Giám đốc</option>
                            <option>Kinh doanh</option>
                            <option>Chứng từ</option>
                            <option>Điều vận</option>
                            <option>Kế toán</option>
                            <option>Hiện trường</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label small fw-semibold">Mật khẩu</label>
                            <input type="password" class="form-control bg-light border-0" required>
                        </div>
                        <div class="col-md-6 mb-4">
                            <label class="form-label small fw-semibold">Xác nhận</label>
                            <input type="password" class="form-control bg-light border-0" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-navy w-100 py-2 fw-bold">TẠO TÀI KHOẢN</button>
                    <p class="text-center mt-3 text-muted small">
                        Đã có tài khoản? <a href="login.html" class="text-navy fw-bold text-decoration-none">Đăng nhập</a>
                    </p>
                </form>
            </div>
        </div>
    </section>
    <script src="js/app.js"></script>
</body>
</html>
